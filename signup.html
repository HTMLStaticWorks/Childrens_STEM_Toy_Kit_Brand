<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StemGen | Sign Up</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link id="bootstrap-css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: var(--bg-gradient); min-height: 100vh; display: flex; flex-direction: column;">

    

    <!-- Sign Up Form Section -->
    <section class="flex-grow-1 d-flex align-items-center pt-5 mt-5">
        <div class="container py-5">
            <div class="row justify-content-center align-items-center g-5">
                
                

                <div class="col-lg-5" data-aos="fade-left">
                    <div class="glass-panel p-5">
                        <div class="text-center mb-4">
                            <a href="index.html" class="text-decoration-none">
                                <span class="fs-1">🔬</span>
                                <h3 class="fw-bold mt-2 text-primary">StemGen</h3>
                            </a>
                        </div>
                        <h4 class="fw-bold mb-4 text-center">Create Account</h4>
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Parent's Full Name</label>
                                <input type="text" class="form-control form-control-lg" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control form-control-lg" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <input type="password" id="password" class="form-control form-control-lg border-end-0" required>
                                    <button class="btn btn-outline-secondary border-start-0" type="button" onclick="togglePasswordVisibility('password', this)">
                                        <i class="fas fa-eye text-muted"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirm Password</label>
                                <div class="input-group">
                                    <input type="password" id="confirm_password" class="form-control form-control-lg border-end-0" required>
                                    <button class="btn btn-outline-secondary border-start-0" type="button" onclick="togglePasswordVisibility('confirm_password', this)">
                                        <i class="fas fa-eye text-muted"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="terms" required>
                                <label class="form-check-label text-muted" for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</label>
                            </div>
                            <button type="submit" class="btn btn-primary-custom btn-lg w-100">Join StemGen</button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p class="text-muted small mb-3">Or sign up with</p>
                            <div class="d-flex justify-content-center gap-2 mb-3">
                                <a href="#" class="btn btn-outline-dark d-flex align-items-center justify-content-center py-2 px-3 rounded-pill w-100 btn-social-login">
                                    <i class="fab fa-google text-danger me-2"></i> Google
                                </a>
                                <a href="#" class="btn btn-outline-dark d-flex align-items-center justify-content-center py-2 px-3 rounded-pill w-100 btn-social-login">
                                    <i class="fab fa-facebook-f text-primary me-2"></i> Facebook
                                </a>
                            </div>
                            <p class="mb-0 mt-4">Already have an account? <a href="login.html" class="fw-bold text-primary text-decoration-none">Log in</a></p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
    <script>
        function togglePasswordVisibility(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
