<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradients -->
    <linearGradient id="flaskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b2cbf" />
      <stop offset="100%" stop-color="#3a0ca3" />
    </linearGradient>
    <linearGradient id="liquidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#ff7b00" />
    </linearGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd600" />
      <stop offset="100%" stop-color="#ff9800" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Cogs/Gear (Engineering / Tech) -->
  <g id="bgGear" stroke="url(#orbitGrad)" stroke-width="2" fill="none" opacity="0.35" transform="rotate(15 50 54)">
    <circle cx="50" cy="54" r="6" />
    <!-- Teeth -->
    <rect x="48.5" y="42" width="3" height="24" rx="1" />
    <rect x="48.5" y="42" width="3" height="24" rx="1" transform="rotate(45 50 54)" />
    <rect x="48.5" y="42" width="3" height="24" rx="1" transform="rotate(90 50 54)" />
    <rect x="48.5" y="42" width="3" height="24" rx="1" transform="rotate(135 50 54)" />
    <circle cx="50" cy="54" r="10" stroke-width="2" />
  </g>

  <!-- Atom Orbits (Physics / Math) -->
  <ellipse cx="50" cy="54" rx="38" ry="11" fill="none" stroke="url(#orbitGrad)" stroke-width="3" transform="rotate(-28 50 54)" stroke-linecap="round" opacity="0.85"/>
  <ellipse cx="50" cy="54" rx="38" ry="11" fill="none" stroke="url(#orbitGrad)" stroke-width="3" transform="rotate(28 50 54)" stroke-linecap="round" opacity="0.85"/>

  <!-- Electrons / Floating Particles with Glow -->
  <circle cx="16" cy="40" r="3.5" fill="#00f2fe" filter="url(#glow)"/>
  <circle cx="84" cy="68" r="3.5" fill="#ff007f" filter="url(#glow)"/>
  <circle cx="50" cy="20" r="3" fill="#ff7b00" filter="url(#glow)"/>

  <!-- Beaker Inner Liquid (Chemistry / Biology) -->
  <clipPath id="flaskInner">
    <path d="M 45.5 20 h 9 v 16 L 73.5 70.5 a 4 4 0 0 1 -4 4 H 30.5 a 4 4 0 0 1 -4 -4 L 45.5 36 Z" />
  </clipPath>
  
  <g clip-path="url(#flaskInner)">
    <!-- Liquid fill -->
    <path d="M 15 54 Q 32.5 49, 50 54 T 85 54 V 82 H 15 Z" fill="url(#liquidGrad)" opacity="0.85"/>
    <!-- Wave Highlight -->
    <path d="M 15 56 Q 32.5 52, 50 56 T 85 56 V 82 H 15 Z" fill="#ffffff" opacity="0.2"/>
    <!-- Bubbles -->
    <circle cx="44" cy="62" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="54" cy="68" r="3" fill="#ffffff" opacity="0.5"/>
    <circle cx="38" cy="71" r="1.5" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- Beaker Glass Outline -->
  <path d="M 44 18 h 12 v 18 L 76 72 a 6 6 0 0 1 -6 6 H 30 a 6 6 0 0 1 -6 -6 L 44 36 Z" 
        fill="none" 
        stroke="url(#flaskGrad)" 
        stroke-width="4.5" 
        stroke-linejoin="round" 
        stroke-linecap="round"/>

  <!-- Beaker Lip Top -->
  <rect x="41" y="14" width="18" height="4" rx="2" fill="url(#flaskGrad)"/>

  <!-- Sparkles / Stars (Inspiration / Wonder) -->
  <path d="M 78 18 Q 78 22, 82 22 Q 78 22, 78 26 Q 78 22, 74 22 Q 78 22, 78 18" fill="url(#sparkleGrad)" filter="url(#glow)"/>
  <path d="M 24 27 Q 24 30, 27 30 Q 24 30, 24 33 Q 24 30, 21 30 Q 24 30, 24 27" fill="url(#sparkleGrad)" filter="url(#glow)"/>
</svg>
